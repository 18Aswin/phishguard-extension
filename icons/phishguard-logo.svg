<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0f0e1a" rx="80"/>

  <!-- Shield body -->
  <g filter="url(#shadow)">
    <path d="M256 60 L390 108 L390 240 Q390 340 256 400 Q122 340 122 240 L122 108 Z"
          fill="url(#shieldGrad)"/>
  </g>

  <!-- Shield inner -->
  <path d="M256 82 L368 126 L368 240 Q368 328 256 382 Q144 328 144 240 L144 126 Z"
        fill="url(#innerGrad)" opacity="0.5"/>

  <!-- Shield inner border -->
  <path d="M256 82 L368 126 L368 240 Q368 328 256 382 Q144 328 144 240 L144 126 Z"
        fill="none" stroke="#a5b4fc" stroke-width="2" opacity="0.6"/>

  <!-- Hook vertical -->
  <line x1="256" y1="140" x2="256" y2="268" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Hook J curve -->
  <path d="M256 268 Q256 314 224 314 Q192 314 192 286"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Hook tip -->
  <path d="M192 286 L180 264" fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <!-- Barb -->
  <path d="M192 286 L214 294" fill="none" stroke="#fbbf24" stroke-width="11" stroke-linecap="round"/>
  <!-- Eye ring -->
  <circle cx="256" cy="136" r="14" fill="none" stroke="#fbbf24" stroke-width="10"/>

  <!-- Top shield accent -->
  <path d="M222 96 L290 96" stroke="#a5b4fc" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
